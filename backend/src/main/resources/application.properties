# Server
server.port=8080

# Reverse proxy support (required for Railway + Cloudflare)
server.forward-headers-strategy=FRAMEWORK

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/booking_system_db
spring.datasource.username=booking_user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=your_jwt_secret_key_change_in_production
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000

# Springdoc / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
